######################
### DESIGN CHANGES ###
######################

# change prefix key
unbind c-b
set -g prefix C-Space
set -sg escape-time 0
set -g repeat-time 300


# ## Status bar design
# # status line
set -g status-justify left
set -g status-style "fg=#2e7de9,bg=#d0d5e3"
set -g status-fg "#2e7de9"

# Vim gitgutter
set -g focus-events on


#window mode
set -g mode-style "fg=#2e7de9,bg=#a8aecb"

# # window status
setw -g window-status-current-style fg="#2e7de9"
setw -g window-status-current-style bg="#a8aecb"
setw -g window-status-current-format '#[fg=#2e7de9 bg=#a8aecb] #I #[fg=#2e7de9 bg=#a8aecb,bold] #W  '
setw -g window-status-style fg="#6172b0"
setw -g window-status-style bg="#d0d5e3"
setw -g window-status-activity-style 'underscore,fg=#6172b0,bg=#d0d5e3'
setw -g window-status-format '#[fg=#6172b0 bg=#d0d5e3] #I #[fg=#6172b0 bg=#d0d5e3] #W  '

